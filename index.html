<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botón Misterioso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="contador-box">
    <h4>¿Cuántos clicks necesito?</h4>
    <div id="contador">0</div>
</div>

<div id="resultado" class="text-center fw-bold rounded-4 shadow-lg"></div>
<div id="imagenRandom" class="text-center"></div>

<button id="botonMisterioso" class="btn btn-primary btn-lg px-5 py-3">
    Púlsame
</button>

<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<button class="btn btn-outline-light rounded-circle shadow" type="button"
        data-bs-toggle="offcanvas" data-bs-target="#panelResultados"
        style="position: fixed; bottom: 20px; left: 20px; z-index: 10001; backdrop-filter: blur(5px);">
    📊
</button>

<div class="offcanvas offcanvas-end" tabindex="-1" id="panelResultados"
     style="background: rgba(0,0,0,0.8); color: white; backdrop-filter: blur(10px); width: 350px;">
    <div class="offcanvas-header border-bottom border-secondary">
        <h5 class="offcanvas-title">📈 Mis Estadísticas</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body" id="contenidoPanel">
        <div class="text-center">
            <div class="spinner-border text-info" role="status"></div>
            <p>Cargando datos del servidor...</p>
        </div>
    </div>
    <div class="p-3 border-top border-secondary">
        <a href="/generar-informe" target="_blank" class="btn btn-info w-100">Ver Informe Completo (PDF/HTML)</a>
    </div>
</div>
</body>
</html>
